name: Docker Image Build Push & Deploy

on:
  push:
    branches: [ "main" ]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin' # See 'Supported distributions' for available options
        java-version: '21'

    - name: Build .jar
      run: |
        chmod +x ./mvnw
        ./mvnw clean package -DskipTests
        

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/demo-spring-boot-app:latest

    - name: Push Image to Docker Hub
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/demo-spring-boot-app:latest

    - name: SSH and Deploy
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker stop demo-spring || true
          docker rm demo-spring || true
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/demo-spring-boot-app:latest
          docker run -d --name demo-spring -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/demo-spring-boot-app:latest
  
